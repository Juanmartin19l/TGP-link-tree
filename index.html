<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesorería General de la Provincia | Tucumán</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen">
  <header>
    <div class="max-w-5xl mx-auto px-4 py-5 flex items-center gap-8">
      <img src="images/logo.png" alt="Logo Tesorería General de la Provincia | Tucumán" class="header-logo">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-[#005EA6]">Tesorería General de la Provincia</h1>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 pt-8 pb-10">
    <section class="mb-6">
      <div class="flex items-center gap-3 mb-3">
        <div class="brand-mark">
          <i class="fa-solid fa-building-columns text-[#005EA6]"></i>
        </div>
        <div>
          <h2 class="text-xl md:text-2xl font-semibold text-[#003b6a]">Accesos Rápidos de Gestión</h2>
          <p class="text-sm md:text-base text-[#4f667d]">Portal interno de enlaces operativos para tareas diarias.</p>
        </div>
      </div>
      <div class="main-frame">
        <div class="frame-title">Recursos Disponibles</div>
        <div id="links-container" class="p-3 md:p-4 space-y-3"></div>
      </div>
    </section>
  </main>

  <footer class="text-center px-4 pb-5">
    <p>Tesorería General de la Provincia de Tucumán</p>
    <p class="text-xs mt-1">Color institucional principal: #005ea6</p>
  </footer>

  <script type="module" src="src/links.js"></script>
  <script type="module" src="src/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('loaded');
    });
  </script>
</body>

</html>
